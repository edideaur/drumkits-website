name: Scrape drum kits

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - run: python scraper.py

      - name: Commit updated kits.ndjson
        run: |
          git config user.name "edideaur"
          git config user.email "eduard@prigoana.com"
          git add public/kits.ndjson
          git diff --cached --quiet || git commit -m "chore: update kits.ndjson [skip ci]"
          git push
